defaults:
  - env/maniskill_put_on_plate_in_scene_25_main@env.train
  - env/maniskill_put_on_plate_in_scene_25_main@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

# ========== GRPO with Pi0 on ManiSkill ==========

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "./logs"
    project_name: rlinf
    experiment_name: "maniskill_grpo_pi0"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: 10
  save_interval: 10
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 256
    group_size: ${algorithm.group_size}
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    init_params:
      use_multiple_plates: False
  eval:
    total_num_envs: 160
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    group_size: 1
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    init_params:
      use_multiple_plates: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: "logs/20260416-13:34:01-maniskill_hier_S5_both_05/maniskill_hier_S5_both_05/checkpoints/global_step_150"
    precision: ${actor.model.precision}
    model_type: "openpi"
    add_value_head: False
    num_action_chunks: ${actor.model.num_action_chunks}
    num_steps: ${actor.model.num_steps}
    openpi:
      value_after_vlm: False
      config_name: "pi0_maniskill"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 8
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True
      num_steps: ${actor.model.num_steps}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 2048
  seed: 1234
  enable_offload: False
  model:
    model_path: "logs/20260416-13:34:01-maniskill_hier_S5_both_05/maniskill_hier_S5_both_05/checkpoints/global_step_150"
    model_type: "openpi"
    add_value_head: False
    num_action_chunks: 5
    num_steps: 4
    openpi:
      value_after_vlm: False
      config_name: "pi0_maniskill"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 8
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True
      num_steps: 4
    policy_setup: widowx_bridge

  optim:
    lr: 7.91e-6
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
