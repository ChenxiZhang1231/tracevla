defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

# ========== Hierarchical S6 with Pi0 on LIBERO-Spatial ==========

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_hier_S6_both_10_pi0"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 8
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 1

  adv_type: hierarchical_gae
  loss_type: hierarchical_actor_critic
  loss_agg_func: "token-mean"

  chunk_gamma: 0.99
  step_gamma: 1.0
  gae_lambda: 0.95
  step_gae_lambda: 1.0

  use_bilevel_actor: True
  chunk_actor_coef: 1.0
  step_actor_coef: 0.2
  chunk_value_coef: 1.0
  step_value_coef: 0.2

  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 64
    auto_reset: False
    use_fixed_reset_state_ids: False
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
  eval:
    total_num_envs: 50
    auto_reset: False
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    use_fixed_reset_state_ids: False
    group_size: ${algorithm.group_size}
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_spatial
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: "logs/20260324-14:24:49-libero_spatial_hier_S5_both_05/libero_spatial_hier_S5_both_05/checkpoints/global_step_40"
    precision: ${actor.model.precision}
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: ${actor.model.num_action_chunks}
    num_steps: ${actor.model.num_steps}
    openpi:
      value_after_vlm: True
      config_name: "pi05_libero"
      num_images_in_input: 2
      noise_method: "flow_noise"
      action_horizon: 10
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True
      num_steps: ${actor.model.num_steps}
      use_tracevla_value: True
      x0_value_embed_dim: 256
      tracevla_value_mode: "compressed_concat"
      prefix_value_embed_dim: 512

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 512
  seed: 42
  enable_offload: False
  model:
    model_path: "logs/20260324-14:24:49-libero_spatial_hier_S5_both_05/libero_spatial_hier_S5_both_05/checkpoints/global_step_40"
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: 10
    num_steps: 4
    openpi:
      value_after_vlm: True
      config_name: "pi05_libero"
      num_images_in_input: 2
      noise_method: "flow_noise"
      action_horizon: 10
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True
      num_steps: 4
      use_tracevla_value: True
      x0_value_embed_dim: 256
      tracevla_value_mode: "compressed_concat"
      prefix_value_embed_dim: 512
    policy_setup: widowx_bridge

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 10

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    use_orig_params: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
