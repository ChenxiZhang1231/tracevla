defaults:
  - env/libero_10@env.train
  - env/libero_10@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

# ========== Ablation P5: Hierarchical Stepwise Value RL on LIBERO-10 ==========
# Chunk value: value_after_vlm -> chunk_advantages -> chunk_returns
# Step value: tracevla (suffix + x0_pred) -> step_advantages -> L_step_actor
# IMPORTANT: Bi-level actor disabled - only step_advantages updates policy
# Chunk value contributes indirectly: chunk_returns -> step λ-return terminal targets

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_ablation_P5_prefix_512"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 40
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 2
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 4

  adv_type: hierarchical_gae
  loss_type: hierarchical_actor_critic
  loss_agg_func: "token-mean"

  # Hierarchical GAE parameters
  chunk_gamma: 0.99            # Discount factor for chunk-level transitions
  step_gamma: 1.0              # Discount factor for step-level transitions

  # Bi-level actor loss: DISABLED to avoid conflicting gradients
  # With use_bilevel_actor=False, only step_advantages updates policy
  # Chunk value still helps via: chunk_returns -> step λ-return targets
  use_bilevel_actor: False
  chunk_actor_coef: 0.0        # Disabled (chunk value influences policy indirectly)
  chunk_value_coef: 0.5        # Weight for chunk-level critic loss
  step_value_coef: 1.0         # Weight for step-level critic loss

  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 16
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    reward_coef: ${algorithm.reward_coef}
  eval:
    total_num_envs: 496
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: "./10000"
    precision: ${actor.model.precision}
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: ${actor.model.num_action_chunks}
    num_steps: ${actor.model.num_steps}
    openpi:
      # Chunk Value - same as baseline (value_after_vlm)
      value_after_vlm: True
      config_name: "pi05_libero"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 16
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True
      num_steps: ${actor.model.num_steps}
      # Step Value - use tracevla (suffix + x0_pred)
      use_tracevla_value: True
      x0_value_embed_dim: 256
      tracevla_value_mode: "compressed_concat"
      prefix_value_embed_dim: 512

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 24
  global_batch_size: 192
  seed: 42
  enable_offload: False
  model:
    model_path: "./10000"
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: 10
    num_steps: 4
    openpi:
      # Chunk Value - same as baseline (value_after_vlm)
      value_after_vlm: True
      config_name: "pi05_libero"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 10
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True
      num_steps: 4
      # Step Value - use tracevla (suffix + x0_pred)
      use_tracevla_value: True
      x0_value_embed_dim: 256
      tracevla_value_mode: "compressed_concat"
      prefix_value_embed_dim: 512
    policy_setup: widowx_bridge

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
    total_training_steps: 1000
    min_lr_rate: 0.1
    lr_scheduler: "cosine"

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    use_orig_params: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
